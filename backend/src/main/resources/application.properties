
server.port=8080
spring.application.name=hr-kms

# ===============================
# JWT Configuration
# ===============================
jwt.secret=HrKmsSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm2025!
jwt.expiration-ms=86400000


spring.datasource.url=jdbc:sqlite:hrkms.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.type=org.springframework.jdbc.datasource.DriverManagerDataSource
spring.datasource.username=
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ===============================
# AI Chat Configuration
# ===============================
# Set "local" for LM Studio / Ollama, "claude" for Claude API
ai.provider=local

# Local AI (LM Studio default port=1234, Ollama port=11434)
ai.local.base-url=http://127.0.0.1:1234
ai.local.model=qwen3.5-9b
