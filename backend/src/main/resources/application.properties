
server.port=8080
spring.application.name=hr-kms

# ===============================
# JWT Configuration
# ===============================
jwt.secret=HrKmsSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm2025!
jwt.expiration-ms=86400000


spring.profiles.active=dev

spring.datasource.url=jdbc:h2:mem:hrkms
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Security Audit Logging
# ===============================
# Directory for rotating log files (override in production via env var LOG_PATH)
logging.file.path=./logs
# Root log level
logging.level.root=INFO
# Silence noisy framework packages in dev
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
# Security audit events — routes to dedicated file via logback-spring.xml
logging.level.SECURITY_AUDIT=INFO
